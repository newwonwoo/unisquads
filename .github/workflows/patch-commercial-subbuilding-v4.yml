name: Patch commercial sub-building v4

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-test-clean:
    if: ${{ github.event.pull_request.head.ref == 'agent/address-commercial-subbuilding-v4' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/address-commercial-subbuilding-v4
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply commercial sub-building patch
        shell: bash
        run: |
          set -o pipefail
          python .github/scripts/apply_commercial_subbuilding_v4.py 2>&1 | tee patch.log

      - name: Install test dependency
        run: npm install --no-save xlsx@0.18.5

      - name: Validate address and IROS contracts
        shell: bash
        run: |
          set -o pipefail
          {
            node --check public/app.js
            grep -F 'EXPLICIT_SUB_BUILDING' public/address-subbuilding-rules.mjs
            grep -F 'subBuilding: pre?.subBuilding || null' public/app.js
            grep -F 'row.result.subBuilding || null' public/app.js
            node --test \
              tests/test_address_subbuilding_rules.mjs \
              tests/test_iros_unit_profile.mjs \
              tests/test_unit_match.mjs \
              tests/test_iros_hardening.mjs \
              tests/test_address_multilot_rules.mjs \
              tests/test_address_quality_rules.mjs \
              tests/test_admin_successor.mjs \
              tests/test_address_recovery_integration.mjs \
              tests/test_address_recovery_rules.mjs \
              tests/test_batch_ui_stats.mjs
            python -m unittest discover -s tests -p 'test_*.py'
          } 2>&1 | tee validation.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commercial-subbuilding-v4-validation
          path: |
            patch.log
            validation.log
          if-no-files-found: warn
          retention-days: 2

      - name: Commit validated files and remove temporary tooling
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/scripts/apply_commercial_subbuilding_v4.py
          rm -f .github/workflows/patch-commercial-subbuilding-v4.yml
          git add public/app.js public/address-subbuilding-rules.mjs public/iros-unit-profile.mjs
          git add public/unit-match.mjs public/iros-run-contract.mjs public/pipeline-contract.mjs
          git add tests/test_address_subbuilding_rules.mjs tests/test_iros_unit_profile.mjs
          git add tests/test_iros_hardening.mjs
          git add -u
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Recognize commercial sub-buildings and basement units"
            git push origin HEAD:agent/address-commercial-subbuilding-v4
          fi
