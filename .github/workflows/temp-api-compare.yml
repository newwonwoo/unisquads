name: temp-api-compare

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Naver and Kakao responses
        shell: bash
        run: |
          python - <<'PY'
          import json, time, urllib.request
          from datetime import datetime, timezone

          cases = [{"target": "부전타워 (원본 '만화리'=오류, 정답 '교리')", "query": "기장군 기장읍 부전타워", "check": "만화리→교리 교정되나", "naver": "https://unisquads.vercel.app/api/naver?query=%EA%B8%B0%EC%9E%A5%EA%B5%B0%20%EA%B8%B0%EC%9E%A5%EC%9D%8D%20%EB%B6%80%EC%A0%84%ED%83%80%EC%9B%8C", "kakao": "https://unisquads.vercel.app/api/kakao?type=keyword&query=%EA%B8%B0%EC%9E%A5%EA%B5%B0%20%EA%B8%B0%EC%9E%A5%EC%9D%8D%20%EB%B6%80%EC%A0%84%ED%83%80%EC%9B%8C"}, {"target": "혜창한마음비치 (원본 '마산시'=옛, 정답 '창원시')", "query": "창원시 진동면 혜창한마음비치", "check": "마산→창원 나오나", "naver": "https://unisquads.vercel.app/api/naver?query=%EC%B0%BD%EC%9B%90%EC%8B%9C%20%EC%A7%84%EB%8F%99%EB%A9%B4%20%ED%98%9C%EC%B0%BD%ED%95%9C%EB%A7%88%EC%9D%8C%EB%B9%84%EC%B9%98", "kakao": "https://unisquads.vercel.app/api/kakao?type=keyword&query=%EC%B0%BD%EC%9B%90%EC%8B%9C%20%EC%A7%84%EB%8F%99%EB%A9%B4%20%ED%98%9C%EC%B0%BD%ED%95%9C%EB%A7%88%EC%9D%8C%EB%B9%84%EC%B9%98"}, {"target": "반촌명지아파트 (원본 '당진군 송악면'=옛)", "query": "당진시 송악읍 반촌명지아파트", "check": "당진군→당진시 나오나", "naver": "https://unisquads.vercel.app/api/naver?query=%EB%8B%B9%EC%A7%84%EC%8B%9C%20%EC%86%A1%EC%95%85%EC%9D%8D%20%EB%B0%98%EC%B4%8C%EB%AA%85%EC%A7%80%EC%95%84%ED%8C%8C%ED%8A%B8", "kakao": "https://unisquads.vercel.app/api/kakao?type=keyword&query=%EB%8B%B9%EC%A7%84%EC%8B%9C%20%EC%86%A1%EC%95%85%EC%9D%8D%20%EB%B0%98%EC%B4%8C%EB%AA%85%EC%A7%80%EC%95%84%ED%8C%8C%ED%8A%B8"}, {"target": "문화파크맨션 (단일동 건물, 칠곡)", "query": "칠곡군 왜관읍 문화파크맨션", "check": "소규모도 잡히나", "naver": "https://unisquads.vercel.app/api/naver?query=%EC%B9%A0%EA%B3%A1%EA%B5%B0%20%EC%99%9C%EA%B4%80%EC%9D%8D%20%EB%AC%B8%ED%99%94%ED%8C%8C%ED%81%AC%EB%A7%A8%EC%85%98", "kakao": "https://unisquads.vercel.app/api/kakao?type=keyword&query=%EC%B9%A0%EA%B3%A1%EA%B5%B0%20%EC%99%9C%EA%B4%80%EC%9D%8D%20%EB%AC%B8%ED%99%94%ED%8C%8C%ED%81%AC%EB%A7%A8%EC%85%98"}, {"target": "선경구서3차아파트 (부산)", "query": "부산 금정구 선경구서3차아파트", "check": "둘 다 같은지", "naver": "https://unisquads.vercel.app/api/naver?query=%EB%B6%80%EC%82%B0%20%EA%B8%88%EC%A0%95%EA%B5%AC%20%EC%84%A0%EA%B2%BD%EA%B5%AC%EC%84%9C3%EC%B0%A8%EC%95%84%ED%8C%8C%ED%8A%B8", "kakao": "https://unisquads.vercel.app/api/kakao?type=keyword&query=%EB%B6%80%EC%82%B0%20%EA%B8%88%EC%A0%95%EA%B5%AC%20%EC%84%A0%EA%B2%BD%EA%B5%AC%EC%84%9C3%EC%B0%A8%EC%95%84%ED%8C%8C%ED%8A%B8"}, {"target": "가평선힐아파트 (가평)", "query": "가평군 가평읍 가평선힐아파트", "check": "군 단위 소도시", "naver": "https://unisquads.vercel.app/api/naver?query=%EA%B0%80%ED%8F%89%EA%B5%B0%20%EA%B0%80%ED%8F%89%EC%9D%8D%20%EA%B0%80%ED%8F%89%EC%84%A0%ED%9E%90%EC%95%84%ED%8C%8C%ED%8A%B8", "kakao": "https://unisquads.vercel.app/api/kakao?type=keyword&query=%EA%B0%80%ED%8F%89%EA%B5%B0%20%EA%B0%80%ED%8F%89%EC%9D%8D%20%EA%B0%80%ED%8F%89%EC%84%A0%ED%9E%90%EC%95%84%ED%8C%8C%ED%8A%B8"}]

          def fetch(url):
              last = None
              for attempt in range(1, 4):
                  try:
                      req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0 API-Compare/1.0", "Accept": "application/json"})
                      with urllib.request.urlopen(req, timeout=30) as r:
                          raw = r.read().decode("utf-8", errors="replace")
                          try:
                              parsed = json.loads(raw)
                          except Exception:
                              parsed = None
                          return {"ok": True, "http_status": r.status, "content_type": r.headers.get("Content-Type", ""), "raw_text": raw, "json": parsed}
                  except Exception as e:
                      last = f"{type(e).__name__}: {e}"
                      time.sleep(attempt * 2)
              return {"ok": False, "error": last, "raw_text": "", "json": None}

          out = {"collected_at": datetime.now(timezone.utc).isoformat(), "source_file_note": "6 buildings x Naver/Kakao = 12 URL calls", "cases": []}
          for i, case in enumerate(cases, 1):
              out["cases"].append({"index": i, "target": case["target"], "query": case["query"], "check": case["check"], "naver": {"url": case["naver"], "response": fetch(case["naver"])}, "kakao": {"url": case["kakao"], "response": fetch(case["kakao"])}})

          with open("naver_kakao_raw_responses.json", "w", encoding="utf-8") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
          print(json.dumps(out, ensure_ascii=False))
          PY

      - name: Upload raw response artifact
        uses: actions/upload-artifact@v4
        with:
          name: naver-kakao-raw-responses
          path: naver_kakao_raw_responses.json
          if-no-files-found: error
          retention-days: 1
