name: Agent IROS hardening

on:
  push:
    branches:
      - agent/iros-export-resume-hardening
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply final app corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("public/app.js")
          source = path.read_text(encoding="utf-8")

          pattern = r'("\\uC911\\uB2E8")\s+\), irosRunMessage'
          source, count = re.subn(
              pattern,
              lambda match: match.group(1) + ")), irosRunMessage",
              source,
              count=1,
          )
          if count != 1 and '"\\uC911\\uB2E8")), irosRunMessage' not in source:
              raise SystemExit("IROS fragment closing marker not found")

          source = source.replace(
              "runState.baseDone || pnuKeys.length",
              "runState.baseDone",
          )
          source = source.replace(
              "runState.alternateDone || alternateEntries.length",
              "runState.alternateDone",
          )
          path.write_text(source, encoding="utf-8")
          PY

      - name: Validate JavaScript syntax
        run: node --check public/app.js

      - name: Install test-only XLSX dependency
        run: npm install --no-save --no-package-lock xlsx@0.18.5

      - name: Run JavaScript tests
        run: node --test tests/test_iros_hardening.mjs tests/test_unit_match.mjs

      - name: Run Python IROS safety tests
        run: python -m unittest discover -s tests -p 'test_iros_safety.py'

      - name: Commit corrected application
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git config user.name "openai-agent"
          git config user.email "openai-agent@users.noreply.github.com"
          git add public/app.js
          if git diff --cached --quiet; then
            echo "No application correction to commit"
          else
            git commit -m "Fix IROS progress and controls rendering"
            git push origin HEAD:${{ github.head_ref }}
          fi
