name: Agent IROS hardening

on:
  push:
    branches:
      - agent/iros-export-resume-hardening
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply deterministic patch
        shell: bash
        run: |
          if grep -q 'buildVerifiedWorkbookArray' public/app.js; then
            exit 0
          fi
          sed -i 's/re.subn(pattern, replacement, text, count=1, flags=flags)/re.subn(pattern, lambda _match: replacement, text, count=1, flags=flags)/' tools/apply_iros_hardening.py
          python - <<'PY'
          from pathlib import Path
          path = Path("tools/apply_iros_hardening.py")
          source = path.read_text(encoding="utf-8")
          source = source.replace('"전체 다운로드"', r'"\\uC804\\uCCB4 \\uB2E4\\uC6B4\\uB85C\\uB4DC"')
          source = source.replace('"중복제거 다운로드"', r'"\\uC911\\uBCF5\\uC81C\\uAC70 \\uB2E4\\uC6B4\\uB85C\\uB4DC"')
          source = source.replace('"실패건 다운로드"', r'"\\uC2E4\\uD328\\uAC74 \\uB2E4\\uC6B4\\uB85C\\uB4DC"')
          path.write_text(source, encoding="utf-8")
          PY
          set +e
          python tools/apply_iros_hardening.py > /tmp/iros-patch.log 2>&1
          status=$?
          set -e
          cat /tmp/iros-patch.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/iros-patch.log patch-failure.log
            git config user.name "openai-agent"
            git config user.email "openai-agent@users.noreply.github.com"
            git add patch-failure.log
            if ! git diff --cached --quiet; then
              git commit -m "Capture IROS patch failure"
              git push origin HEAD:${{ github.head_ref }}
            fi
            exit "$status"
          fi

      - name: Validate JavaScript syntax
        run: node --check public/app.js

      - name: Install test-only XLSX dependency
        run: npm install --no-save --no-package-lock xlsx@0.18.5

      - name: Run JavaScript tests
        run: node --test tests/test_iros_hardening.mjs tests/test_unit_match.mjs

      - name: Run Python IROS safety tests
        run: python -m unittest discover -s tests -p 'test_iros_safety.py'

      - name: Commit patched application
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git config user.name "openai-agent"
          git config user.email "openai-agent@users.noreply.github.com"
          git add public/app.js tools/apply_iros_hardening.py
          if git diff --cached --quiet; then
            echo "No application patch to commit"
          else
            git commit -m "Harden IROS resume and XLSX export"
            git push origin HEAD:${{ github.head_ref }}
          fi
