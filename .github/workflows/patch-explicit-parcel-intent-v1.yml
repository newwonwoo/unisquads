name: Patch explicit parcel intent v1

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-test-clean:
    if: ${{ github.event.pull_request.head.ref == 'agent/explicit-parcel-intent-v1' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/explicit-parcel-intent-v1
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply explicit parcel intent patch
        run: python .github/scripts/apply_explicit_parcel_intent_v1.py

      - name: Install test dependency
        run: npm install --no-save xlsx@0.18.5

      - name: Validate parcel, building, address, and IROS regressions
        shell: bash
        run: |
          set -o pipefail
          {
            node --check public/app.js
            grep -F 'narrowCandidatesByExplicitParcel' public/app.js
            grep -F 'candidateIntentDiagnostics' public/app.js
            grep -F 'EXPLICIT_PARCEL_UNIQUE' public/address-parcel-intent.mjs
            node --test \
              tests/test_address_parcel_intent.mjs \
              tests/test_parcel_intent_app_contract.mjs \
              tests/test_building_candidate_intent.mjs \
              tests/test_subbuilding_app_contract.mjs \
              tests/test_address_subbuilding_rules.mjs \
              tests/test_iros_unit_profile.mjs \
              tests/test_unit_match.mjs \
              tests/test_iros_hardening.mjs \
              tests/test_batch_workflow_state.mjs \
              tests/test_batch_ui_stats.mjs \
              tests/test_address_multilot_rules.mjs \
              tests/test_address_quality_rules.mjs \
              tests/test_admin_successor.mjs \
              tests/test_address_recovery_integration.mjs \
              tests/test_address_recovery_rules.mjs
            python -m unittest discover -s tests -p 'test_*.py'
          } 2>&1 | tee validation.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: explicit-parcel-intent-v1-validation
          path: validation.log
          if-no-files-found: warn
          retention-days: 2

      - name: Commit validated files and remove temporary tooling
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/scripts/apply_explicit_parcel_intent_v1.py
          rm -f .github/workflows/patch-explicit-parcel-intent-v1.yml
          git add public/app.js public/address-parcel-intent.mjs public/pipeline-contract.mjs
          git add tests/test_address_parcel_intent.mjs tests/test_parcel_intent_app_contract.mjs
          git add -u
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Resolve explicit parcel intent before building candidates"
            git push origin HEAD:agent/explicit-parcel-intent-v1
          fi
