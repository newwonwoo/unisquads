name: Fix sub-building evidence

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-test-clean:
    if: ${{ github.event.pull_request.head.ref == 'agent/address-commercial-subbuilding-v4' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/address-commercial-subbuilding-v4
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply evidence fix
        run: python .github/scripts/fix_subbuilding_evidence.py

      - name: Install test dependency
        run: npm install --no-save xlsx@0.18.5

      - name: Validate focused and full regressions
        shell: bash
        run: |
          set -o pipefail
          {
            node --check public/app.js
            node --test \
              tests/test_subbuilding_app_contract.mjs \
              tests/test_address_subbuilding_rules.mjs \
              tests/test_iros_unit_profile.mjs \
              tests/test_unit_match.mjs \
              tests/test_iros_hardening.mjs \
              tests/test_address_multilot_rules.mjs \
              tests/test_address_quality_rules.mjs \
              tests/test_admin_successor.mjs \
              tests/test_address_recovery_integration.mjs \
              tests/test_address_recovery_rules.mjs \
              tests/test_batch_ui_stats.mjs
            python -m unittest discover -s tests -p 'test_*.py'
          } 2>&1 | tee validation.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: subbuilding-evidence-fix-validation
          path: validation.log
          if-no-files-found: warn
          retention-days: 2

      - name: Commit validated fix and remove temporary tooling
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/scripts/fix_subbuilding_evidence.py
          rm -f .github/workflows/fix-subbuilding-evidence.yml
          git add public/app.js tests/test_subbuilding_app_contract.mjs
          git add -u
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix sub-building evidence initialization"
            git push origin HEAD:agent/address-commercial-subbuilding-v4
          fi
