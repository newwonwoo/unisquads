name: Patch batch statistics UI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-feature-branch:
    if: ${{ github.event.pull_request.head.ref == 'agent/upload-source-stats-ui' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/upload-source-stats-ui
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply isolated batch UI patch
        run: |
          git fetch origin main
          git show origin/main:.github/scripts/patch_batch_ui.py > /tmp/patch_batch_ui.py
          python /tmp/patch_batch_ui.py

      - name: Install test dependency
        run: npm install --no-save xlsx@0.18.5

      - name: Validate JavaScript and tests
        run: |
          node --check public/app.js
          node --test tests/test_batch_ui_stats.mjs tests/test_iros_hardening.mjs tests/test_unit_match.mjs
          python -m unittest discover -s tests -p 'test_*.py'

      - name: Commit tested feature branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/app.js public/batch-ui-stats.mjs tests/test_batch_ui_stats.mjs tests/test_iros_hardening.mjs
          git add -u .github/workflows/apply-upload-source-stats-ui.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix batch statistics and status totals"
            git push origin HEAD:agent/upload-source-stats-ui
          fi
