name: Validate address multi-lot P2 review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-test-clean:
    if: ${{ github.event.pull_request.head.ref == 'agent/address-multilot-recovery-p2' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/address-multilot-recovery-p2
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply review hardening
        shell: bash
        run: |
          set -o pipefail
          python .github/scripts/fix_address_multilot_p2_review.py 2>&1 | tee patch.log

      - name: Install test dependency
        run: npm install --no-save xlsx@0.18.5

      - name: Validate full address and IROS contracts
        shell: bash
        run: |
          set -o pipefail
          {
            node --check public/app.js
            node --test \
              tests/test_address_multilot_rules.mjs \
              tests/test_address_quality_rules.mjs \
              tests/test_admin_successor.mjs \
              tests/test_address_recovery_integration.mjs \
              tests/test_address_recovery_rules.mjs \
              tests/test_batch_ui_stats.mjs \
              tests/test_iros_hardening.mjs \
              tests/test_unit_match.mjs
            python -m unittest discover -s tests -p 'test_*.py'
          } 2>&1 | tee validation.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: address-multilot-p2-review-validation
          path: |
            patch.log
            validation.log
          if-no-files-found: warn
          retention-days: 2

      - name: Commit validated files and remove temporary tooling
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/scripts/fix_address_multilot_p2_review.py
          rm -f .github/workflows/patch-address-multilot-p2-review.yml
          git add public/app.js tests/test_address_recovery_integration.mjs
          git add -u
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Harden verified multi-lot recovery"
            git push origin HEAD:agent/address-multilot-recovery-p2
          fi
